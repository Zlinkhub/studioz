<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeuzi Radio Broadcast Console</title>
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --panel-bg: rgba(16, 18, 27, 0.85);
            --fader-bg: #1a1d29;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #05060a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            padding: 10px;
            gap: 12px;
        }

        /* PANEL KIRI: Monitor Musik & Pencarian (Lebar 40%) */
        .left-deck {
            flex: 4;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        /* PANEL KANAN: Konsol Mixer Radio & Fader (Lebar 60%) */
        .right-deck {
            flex: 6;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        /* Gaya Layar Monitor Virtual (On-Air Display) */
        .monitor-screen {
            background: #090a10;
            border: 2px solid #222533;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        .live-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--neon-pink);
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.4; } }

        .search-bar {
            display: flex;
            gap: 8px;
            background: var(--panel-bg);
            padding: 8px;
            border-radius: 10px;
        }

        .search-bar input {
            flex: 1;
            background: #0d0e15;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px;
            color: #fff;
            border-radius: 6px;
            outline: none;
            font-size: 0.85rem;
        }

        .search-bar button {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Desain Konsol Fader Mixer Radio (Fader Vertikal) */
        .mixer-console {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex: 1;
            margin-top: 10px;
            background: #0c0d14;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .fader-channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            height: 100%;
            justify-content: space-between;
        }

        .fader-track {
            width: 8px;
            height: 110px;
            background: #151722;
            border-radius: 4px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* input range yang diputar 270 derajat agar menjadi fader vertikal asli */
        .fader-track input[type="range"] {
            -webkit-appearance: none;
            transform: rotate(270deg);
            width: 110px;
            height: 8px;
            background: transparent;
            position: absolute;
            top: 51px;
            outline: none;
        }

        .fader-track input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 14px;
            border-radius: 3px;
            background: #dadbe2;
            border: 2px solid #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .channel-label {
            font-size: 0.65rem;
            color: #8a8f98;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Soundboard Efek DJ */
        .soundboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .fx-pad {
            background: #181a26;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px;
            color: #a0a5b0;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }

        .fx-pad:active {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.4);
        }

        /* Tombol Kontrol Utama Deck */
        .master-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .btn-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #1c1e2d;
            color: #fff;
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .btn-play {
            width: 55px;
            height: 55px;
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* Mini VU-Meter / Visualizer */
        .vu-meter {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 30px;
        }

        .vu-bar {
            width: 4px;
            height: 3px;
            background: var(--neon-blue);
            transition: height 0.08s ease;
        }
    </style>
</head>
<body>

    <div id="youtube-audio-player" style="display: none;"></div>

    <div class="left-deck">
        <div class="monitor-screen">
            <div class="live-tag">ON AIR</div>
            <div>
                <div style="font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 2px;">NOW BROADCASTING</div>
                <div style="font-size: 1.1rem; font-weight: bold; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="title">STUDIO STANDBY</div>
                <div style="font-size: 0.8rem; color: #6d717d;" id="artist">Radio Console Ready</div>
            </div>
            
            <div class="vu-meter" id="vu-meter">
                </div>
        </div>

        <div class="search-bar">
            <input type="text" id="query" placeholder="Ketik request lagu penonton...">
            <button id="search-btn">CARI</button>
        </div>
    </div>

    <div class="right-deck">
        <div class="soundboard">
            <button class="fx-pad" onclick="playFX('https://www.soundjay.com/buttons/sounds/button-4.mp3')">📯 HORN</button>
            <button class="fx-pad" onclick="playFX('https://www.soundjay.com/human/sounds/applause-01.mp3')">👏 CLAP</button>
            <button class="fx-pad" onclick="playFX('https://www.soundjay.com/mechanical/sounds/clutch-1.mp3')">💿 SCRATCH</button>
            <button class="fx-pad" onclick="playFX('https://www.soundjay.com/buttons/sounds/button-3.mp3')">⚡ LAZER</button>
        </div>

        <div class="mixer-console">
            <div class="fader-channel">
                <div class="fader-track"><input type="range" min="0" max="100" value="80" id="volume"></div>
                <div class="channel-label">MASTER</div>
            </div>
            <div class="fader-channel">
                <div class="fader-track"><input type="range" min="0" max="100" value="70"></div>
                <div class="channel-label">MIC</div>
            </div>
            <div class="fader-channel">
                <div class="fader-track"><input type="range" min="0" max="100" value="50"></div>
                <div class="channel-label">FX</div>
            </div>
            <div class="fader-channel">
                <div class="fader-track"><input type="range" min="0" max="100" value="60"></div>
                <div class="channel-label">MONITOR</div>
            </div>
        </div>

        <div class="master-controls">
            <button class="btn-circle" id="prev">⏮</button>
            <button class="btn-circle btn-play" id="play">▶</button>
            <button class="btn-circle" id="next">⏭</button>
        </div>
    </div>

    <script>
        let player, isPlaying = false, vuInterval;
        const playBtn = document.getElementById('play');
        const vuContainer = document.getElementById('vu-meter');

        // Buat 35 batang VU Meter
        for(let i=0; i<35; i++) {
            let b = document.createElement('div');
            b.className = 'vu-bar';
            vuContainer.appendChild(b);
        }
        const vuBars = document.querySelectorAll('.vu-bar');

        // Load YouTube IFrame API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('head')[0].appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio-player', {
                height: '0', width: '0',
                playerVars: { 'playsinline': 1, 'controls': 0 },
                events: { 'onReady': initConsole, 'onStateChange': handleState }
            });
        }

        function initConsole() {
            player.setVolume(document.getElementById('volume').value);
            playBtn.addEventListener('click', () => {
                if (isPlaying) player.pauseVideo(); else player.playVideo();
            });
            document.getElementById('volume').addEventListener('input', (e) => player.setVolume(e.target.value));
            document.getElementById('search-btn').addEventListener('click', searchAndPlay);
            
            // Masuk otomatis ke mode fullscreen layar penuh jika diketuk di area kosong
            document.body.addEventListener('click', function() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            });
        }

        function searchAndPlay() {
            const query = document.getElementById('query').value.trim();
            if(!query) return;
            document.getElementById('title').innerText = "CONNECTING LINK...";
            
            fetch(`https://images${Math.floor(Math.random() * 3) + 1}-focus-opensocial.googleusercontent.com/gadgets/proxy?container=none&url=https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`)
            .then(res => res.text()).then(html => {
                const id = html.match(/"videoId":"([^"]+)"/)[1];
                if(id) {
                    player.loadVideoById(id);
                    document.getElementById('title').innerText = query.toUpperCase();
                    document.getElementById('artist').innerText = "LIVE REQUEST STANDARD";
                    document.getElementById('query').value = "";
                }
            });
        }

        function handleState(e) {
            if (e.data == YT.PlayerState.PLAYING) {
                isPlaying = true;
                playBtn.innerText = '⏸';
                startVUMeter();
            } else {
                isPlaying = false;
                playBtn.innerText = '▶';
                stopVUMeter();
            }
        }

        function startVUMeter() {
            vuInterval = setInterval(() => {
                vuBars.forEach(bar => {
                    let h = Math.floor(Math.random() * 28) + 2;
                    bar.style.height = h + 'px';
                });
            }, 80);
        }

        function stopVUMeter() {
            clearInterval(vuInterval);
            vuBars.forEach(bar => bar.style.height = '3px');
        }

        function playFX(url) {
            let a = new Audio(url);
            a.volume = 0.5;
            a.play();
        }
    </script>
</body>
</html>
